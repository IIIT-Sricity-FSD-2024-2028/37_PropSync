<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropSync — Administrator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/Administrator_CSS/admin_base.css" />
    <link rel="stylesheet" href="../css/Administrator_CSS/admin_layout.css" />
    <link
      rel="stylesheet"
      href="../css/Administrator_CSS/admin_components.css"
    />
    <link
      rel="stylesheet"
      href="../css/Administrator_CSS/admin_dashboard.css"
    />
    <link
      rel="stylesheet"
      href="../css/Administrator_CSS/admin_participants.css"
    />
    <link
      rel="stylesheet"
      href="../css/Administrator_CSS/admin_complaints.css"
    />
    <link
      rel="stylesheet"
      href="../css/Administrator_CSS/admin_notifications.css"
    />
    <link rel="stylesheet" href="../css/Administrator_CSS/admin_profile.css" />
  </head>
  <body>
    <div id="app"></div>

    <!-- SIDEBAR -->
    <template id="tpl-sidebar">
      <div id="sidebar-overlay"></div>
      <aside id="sidebar">
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
        <div class="sidebar-footer">
          <button class="nav-link" id="logout-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-9A2.25 2.25 0 002.25 5.25v13.5A2.25 2.25 0 004.5 21h9a2.25 2.25 0 002.25-2.25V15M18 15l3-3m0 0l-3-3m3 3H9"
              />
            </svg>
            <span>Logout</span>
          </button>
        </div>
      </aside>
    </template>

    <!-- HEADER -->
    <template id="tpl-header">
      <header id="header">
        <div class="header-left">
          <button
            class="menu-toggle"
            id="menu-toggle"
            aria-label="Toggle sidebar"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5"
              />
            </svg>
          </button>
          <img src="../../public/image.png" alt="PropSync Logo" id="logo" />
        </div>
        <div class="header-right">
          <button
            class="notif-btn"
            id="notif-bell-btn"
            aria-label="Notifications"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
              />
            </svg>
            <span class="notif-badge hidden" id="notif-badge">0</span>
          </button>
          <div class="user-menu-wrapper">
            <button class="user-btn" id="user-btn">
              <div class="user-avatar">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
                  />
                </svg>
              </div>
              <div class="user-info">
                <p class="user-name" id="header-username">Sarah Mitchell</p>
                <svg
                  class="chevron-icon"
                  id="user-chevron"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                  />
                </svg>
              </div>
            </button>
            <div class="user-dropdown" id="user-dropdown">
              <button class="dropdown-item" id="profile-dropdown-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  class="icon-green"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
                  />
                </svg>
                Profile
              </button>
              <button class="dropdown-item" id="logout-dropdown-btn">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-9A2.25 2.25 0 002.25 5.25v13.5A2.25 2.25 0 004.5 21h9a2.25 2.25 0 002.25-2.25V15M18 15l3-3m0 0l-3-3m3 3H9"
                  />
                </svg>
                Logout
              </button>
            </div>
          </div>
        </div>
      </header>
    </template>

    <!-- PAGE: DASHBOARD -->
    <template id="tpl-page-dashboard">
      <div id="page-dashboard" class="page active"></div>
    </template>

    <!-- PAGE: PARTICIPANTS -->
    <template id="tpl-page-participants">
      <div id="page-participants" class="page">
        <div class="mb-6">
          <h1
            style="
              font-size: 24px;
              font-weight: 700;
              color: #111827;
              margin-bottom: 4px;
            "
          >
            Manage Participants
          </h1>
          <p style="font-size: 14px; color: #6b7280">
            Control panel for managing system users
          </p>
        </div>
        <div class="card" style="padding: 16px; margin-bottom: 16px">
          <div class="filter-bar">
            <div class="filter-left">
              <div class="search-wrap">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
                  />
                </svg>
                <input
                  type="text"
                  id="p-search"
                  class="search-input"
                  placeholder="Search by name, ID, or email..."
                />
              </div>
              <div class="relative">
                <button class="dropdown-btn" id="role-filter-btn">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591L15.25 12.46a2.25 2.25 0 00-.659 1.591v3.055c0 .414-.249.783-.632.918l-4.5 1.64A.75.75 0 018.25 19v-5.95a2.25 2.25 0 00-.659-1.591L3.491 7.41A2.25 2.25 0 012.832 5.82V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z"
                    />
                  </svg>
                  <span id="role-filter-label">All Roles</span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                    />
                  </svg>
                </button>
                <div class="dropdown-menu" id="role-filter-menu">
                  <button data-role="All Roles">All Roles</button>
                  <button data-role="Property Owner">Property Owner</button>
                  <button data-role="Service Provider">Service Provider</button>
                  <button data-role="Maintenance Manager">
                    Maintenance Manager
                  </button>
                </div>
              </div>
              <div class="relative">
                <button class="dropdown-btn" id="sort-btn">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                    />
                  </svg>
                  <span id="sort-label">Sort By</span>
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                    />
                  </svg>
                </button>
                <div class="dropdown-menu" id="sort-menu">
                  <button data-sort="name">Name (A-Z)</button>
                  <button data-sort="id">ID (A-Z)</button>
                  <button data-sort="email">Email (A-Z)</button>
                </div>
              </div>
            </div>
            <button class="btn btn-green" id="add-participant-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                style="width: 16px; height: 16px; stroke: #fff"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4.5v15m7.5-7.5h-15"
                />
              </svg>
              Add Participant
            </button>
          </div>
        </div>
        <div class="card table-wrap">
          <table id="participants-table">
            <thead>
              <tr>
                <th>
                  <button id="sort-id-btn">
                    Participant ID
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                      />
                    </svg>
                  </button>
                </th>
                <th>
                  <button id="sort-name-btn">
                    Name
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                      />
                    </svg>
                  </button>
                </th>
                <th>
                  <button id="sort-email-btn">
                    Email
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 7.5L7.5 3m0 0L12 7.5M7.5 3v13.5m13.5 0L16.5 21m0 0L12 16.5m4.5 4.5V7.5"
                      />
                    </svg>
                  </button>
                </th>
                <th>Role</th>
                <th>Access Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="participants-tbody"></tbody>
          </table>
        </div>
      </div>
    </template>

    <!-- PAGE: COMPLAINTS -->
    <template id="tpl-page-complaints">
      <div id="page-complaints" class="page">
        <div style="margin-bottom: 20px">
          <h1
            style="
              font-size: 24px;
              font-weight: 700;
              color: #111827;
              margin-bottom: 4px;
            "
          >
            Complaints
          </h1>
          <p style="font-size: 14px; color: #6b7280">
            Manage maintenance complaints and service requests
          </p>
        </div>
        <div
          style="
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
          "
        >
          <div class="relative">
            <button
              class="btn btn-outline"
              id="complaints-filter-btn"
              style="border: 1px solid #e5e7eb; gap: 8px"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                style="width: 18px; height: 18px; stroke: #16a34a"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591L15.25 12.46a2.25 2.25 0 00-.659 1.591v3.055c0 .414-.249.783-.632.918l-4.5 1.64A.75.75 0 018.25 19v-5.95a2.25 2.25 0 00-.659-1.591L3.491 7.41A2.25 2.25 0 012.832 5.82V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z"
                />
              </svg>
              <span id="complaints-filter-label">All Complaints</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                style="width: 16px; height: 16px; stroke: #374151"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                />
              </svg>
            </button>
            <div
              class="complaints-filter-dropdown"
              id="complaints-filter-menu"
            ></div>
          </div>
          <div class="search-wrap" style="flex: 1; max-width: 500px">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
              />
            </svg>
            <input
              type="text"
              id="complaints-search"
              class="search-input"
              placeholder="Search by title, service provider, type, or property..."
            />
          </div>
          <div class="results-count" id="complaints-count">0 Complaints</div>
          <button class="btn btn-green" id="add-complaint-btn">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              style="width: 16px; height: 16px; stroke: #fff"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 4.5v15m7.5-7.5h-15"
              />
            </svg>
            Add Complaint
          </button>
        </div>
        <div id="complaints-list"></div>
      </div>
    </template>

    <!-- PAGE: NOTIFICATIONS -->
    <template id="tpl-page-notifications">
      <div id="page-notifications" class="page">
        <div style="max-width: 1024px; margin: 0 auto">
          <div class="notif-page-header">
            <div class="notif-page-header-top">
              <div>
                <h1>Notifications</h1>
                <p>
                  View alerts and updates related to system activities and user
                  management.
                </p>
              </div>
              <span class="unread-pill hidden" id="notif-unread-pill"
                >0 Unread</span
              >
            </div>
            <div class="notif-filter-row">
              <div class="relative">
                <button class="notif-filter-btn" id="notif-filter-btn">
                  <div style="display: flex; align-items: center; gap: 8px">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke-width="1.5"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
                      />
                    </svg>
                    <span id="notif-filter-label">All Notifications</span>
                  </div>
                  <svg
                    class="chevron-icon"
                    id="notif-filter-chevron"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M19.5 8.25l-7.5 7.5-7.5-7.5"
                    />
                  </svg>
                </button>
                <div class="notif-filter-dropdown" id="notif-filter-menu">
                  <button data-filter="all" class="active">
                    All Notifications
                  </button>
                  <button data-filter="unread">Unread Only</button>
                  <button data-filter="read">Read Only</button>
                </div>
              </div>
              <div class="notif-actions">
                <button class="btn btn-green" id="mark-all-read-btn">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    style="width: 16px; height: 16px; stroke: #fff"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M4.5 12.75l6 6 9-13.5"
                    />
                  </svg>
                  Mark All Read
                </button>
                <button class="btn btn-outline" id="clear-all-notif-btn">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    style="width: 16px; height: 16px; stroke: #374151"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
                    />
                  </svg>
                  Clear All
                </button>
              </div>
            </div>
          </div>
          <div id="notifications-list"></div>
        </div>
      </div>
    </template>

    <!-- PAGE: PROFILE -->
    <template id="tpl-page-profile">
      <div id="page-profile" class="page">
        <div class="profile-inner">
          <div style="margin-bottom: 32px">
            <h1 style="font-size: 30px; font-weight: 700; color: #111827">
              My Profile
            </h1>
            <p style="color: #6b7280; margin-top: 8px">
              Manage your account information and super user details.
            </p>
          </div>
          <div id="profile-content"></div>
        </div>
      </div>
    </template>

    <!-- ALL MODALS -->
    <template id="tpl-modals">
      <!-- ADD PARTICIPANT -->
      <div class="modal-overlay hidden" id="add-participant-modal">
        <div class="modal modal-md">
          <div class="modal-header">
            <div>
              <h2>Add New Participant</h2>
              <p class="modal-subtitle">
                Fill in the details to create a new participant account
              </p>
            </div>
            <button class="modal-close" data-close="add-participant-modal">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>Full Name <span class="req">*</span></label
              ><input
                type="text"
                id="ap-name"
                class="form-control"
                placeholder="John Doe"
              />
              <p class="form-error" id="ap-name-error"></p>
            </div>
            <div class="form-group">
              <label>Email <span class="req">*</span></label
              ><input
                type="email"
                id="ap-email"
                class="form-control"
                placeholder="email@example.com"
              />
            </div>
            <div class="form-group">
              <label>Contact Number <span class="req">*</span></label
              ><input
                type="tel"
                id="ap-contact"
                class="form-control"
                placeholder="+91 9734298517"
              />
              <p class="form-error" id="ap-contact-error"></p>
            </div>
            <div class="form-group">
              <label>Password <span class="req">*</span></label>
              <div class="pass-wrap">
                <input
                  type="password"
                  id="ap-password"
                  class="form-control"
                  placeholder="••••••••"
                /><button
                  type="button"
                  class="pass-toggle"
                  data-target="ap-password"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    class="eye-icon"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
