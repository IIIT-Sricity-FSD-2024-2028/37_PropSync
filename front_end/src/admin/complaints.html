<!-- pages/complaints.html -->
<div id="page-complaints" class="page">
  <div style="margin-bottom:20px;">
    <h1 style="font-size:24px;font-weight:700;color:#111827;margin-bottom:4px;">Complaints</h1>
    <p style="font-size:14px;color:#6b7280;">Manage maintenance complaints and service requests</p>
  </div>

  <!-- Toolbar -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
    <!-- Filter btn -->
    <div class="relative">
      <button class="btn btn-outline" id="complaints-filter-btn" style="border:1px solid #e5e7eb;gap:8px;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" style="width:18px;height:18px;stroke:#16a34a;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 01-.659 1.591L15.25 12.46a2.25 2.25 0 00-.659 1.591v3.055c0 .414-.249.783-.632.918l-4.5 1.64A.75.75 0 018.25 19v-5.95a2.25 2.25 0 00-.659-1.591L3.491 7.41A2.25 2.25 0 012.832 5.82V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0112 3z"/>
        </svg>
        <span id="complaints-filter-label">All Complaints</span>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" style="width:16px;height:16px;stroke:#374151;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
        </svg>
      </button>
      <div class="complaints-filter-dropdown" id="complaints-filter-menu"></div>
    </div>

    <!-- Search -->
    <div class="search-wrap" style="flex:1;max-width:500px;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
      </svg>
      <input type="text" id="complaints-search" class="search-input" placeholder="Search by title, service provider, type, or property..." />
    </div>

    <!-- Results count -->
    <div class="results-count" id="complaints-count">0 Complaints</div>

    <!-- Add Complaint -->
    <button class="btn btn-green" id="add-complaint-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" style="width:16px;height:16px;stroke:#fff;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Add Complaint
    </button>
  </div>

  <!-- Complaints List -->
  <div id="complaints-list"></div>
</div>
