<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — PropSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<script src="../js/taskData.js"></script>
<script>
let typeFilter = 'All';

const typeConfig = {
  new_complaint:{ label:'New Complaint', bgCls:'notif-icon-green',  svg:`<svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>` },
  assignment:   { label:'Assignment',   bgCls:'notif-icon-blue',   svg:`<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>` },
  deadline:     { label:'Deadline',     bgCls:'notif-icon-yellow', svg:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>` },
  approval:     { label:'Approval',     bgCls:'notif-icon-teal',   svg:`<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>` },
  completion:   { label:'Completion',   bgCls:'notif-icon-green',  svg:`<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>` },
};

function renderNotifications() {
  const all = getNotifications();
  const filtered = typeFilter === 'All' ? all : all.filter(n => n.type === typeFilter);
  const unread = all.filter(n => !n.read).length;
  const container = document.getElementById('notif-list');
  const el = document.getElementById('unread-count');
  if (el) el.textContent = `${unread} unread notification${unread !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="notif-empty">
        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <h3>No Notifications</h3>
        <p>You're all caught up! No notifications to show.</p>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(n => {
    const cfg = typeConfig[n.type] || typeConfig.assignment;
    return `
      <div class="notif-page-item ${n.read ? '' : 'unread'}" id="notif-${n.id}">
        <div class="notif-page-body">
          <div class="notif-page-icon ${cfg.bgCls}">${cfg.svg}</div>
          <div class="notif-page-content">
            <div class="notif-page-top">
              <div>
                <div class="notif-page-title-row">
                  <span class="notif-page-title">${n.title}</span>
                  ${!n.read ? '<span class="notif-page-new">New</span>' : ''}
                </div>
                <span class="notif-page-type">${cfg.label}</span>
              </div>
              <div class="notif-page-time">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${n.timestamp}
              </div>
            </div>
            <p class="notif-page-msg">${n.message}</p>
            <div class="notif-page-actions">
              ${!n.read ? `<button class="notif-action-btn mark-read" onclick="doMarkRead('${n.id}')">
                <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Mark as Read
              </button>` : ''}
              <button class="notif-action-btn delete-btn" onclick="doDelete('${n.id}')">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>Delete
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function doMarkRead(id)  { markNotifRead(id);     renderNotifications(); }
function doMarkAllRead() { markAllNotifsRead();    renderNotifications(); }
function doDelete(id)    { deleteNotification(id); renderNotifications(); }

function buildPage() {
  initShell('notifications');
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="page-header">
      <h1>Alerts & Notifications</h1>
      <p>Stay updated with your latest assignments, deadlines, and approvals.</p>
    </div>
    <div class="filters-bar mb-6">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <div class="filter-field" style="min-width:220px;">
            <svg class="filter-field-icon" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            <select class="filter-select" id="type-filter">
              <option value="All">All Types</option>
              <option value="new_complaint">New Complaints</option>
              <option value="assignment">Assignments</option>
              <option value="deadline">Deadlines</option>
              <option value="approval">Approvals</option>
              <option value="completion">Completions</option>
            </select>
          </div>
          <span id="unread-count" style="font-size:0.88rem;color:var(--muted-foreground);"></span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="doMarkAllRead()">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;"><polyline points="20 6 9 17 4 12"/></svg>
          Mark All as Read
        </button>
      </div>
    </div>
    <div id="notif-list"></div>
  `;
  document.getElementById('type-filter').addEventListener('change', function() {
    typeFilter = this.value; renderNotifications();
  });
  renderNotifications();
}

document.addEventListener('DOMContentLoaded', buildPage);
</script>
</body>
</html>
