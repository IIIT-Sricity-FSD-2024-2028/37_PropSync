<div id="page-notifications" class="page" style="padding: 32px">
  <div style="max-width: 1024px; margin: 0 auto">
    <!-- HEADER -->
    <div
      style="
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        border: 1px solid #e5e7eb;
        padding: 24px;
        margin-bottom: 24px;
      "
    >
      <div
        style="
          display: flex;
          justify-content: space-between;
          margin-bottom: 16px;
        "
      >
        <div>
          <h1 style="font-size: 22px; font-weight: 700">Notifications</h1>
          <p style="font-size: 14px; color: #6b7280">View alerts and updates</p>
        </div>
        <span
          id="notif-unread-pill"
          style="
            background: #ef4444;
            color: #fff;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 9999px;
            display: none;
          "
        >
          0 Unread
        </span>
      </div>

      <!-- FILTER -->
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <button
          id="notif-filter-btn"
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 2px solid #16a34a;
            color: #16a34a;
            border-radius: 8px;
            background: #fff;
          "
        >
          <!-- FIXED ICON -->
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            style="width: 14px; height: 14px"
          >
            <path
              stroke-width="1.5"
              d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31"
            />
          </svg>

          <span id="notif-filter-label">All Notifications</span>
        </button>

        <div style="display: flex; gap: 8px">
          <button
            id="mark-all-read-btn"
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              background: #16a34a;
              color: #fff;
              padding: 8px 12px;
              border-radius: 8px;
              border: none;
            "
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="white"
              style="width: 14px; height: 14px"
            >
              <path stroke-width="1.5" d="M4.5 12.75l6 6 9-13.5" />
            </svg>

            Mark All Read
          </button>

          <button
            id="clear-all-notif-btn"
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              border: 1px solid #d1d5db;
              padding: 8px 12px;
              border-radius: 8px;
              background: #fff;
            "
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#374151"
              style="width: 14px; height: 14px"
            >
              <path stroke-width="1.5" d="M14.74 9l-.346 9" />
            </svg>

            Clear All
          </button>
        </div>
      </div>
    </div>

    <!-- NOTIFICATION LIST -->
    <div id="notifications-list"></div>
  </div>
</div>
