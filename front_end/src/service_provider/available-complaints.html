<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Available Complaints — PropSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<script src="../js/taskData.js"></script>
<script>
let selectedComplaint = null;

function urgencyClass(u) {
  return { High:'urgency-high', Medium:'urgency-medium', Low:'urgency-low' }[u] || 'urgency-low';
}

function getFiltered() {
  const search   = (document.getElementById('search-input')?.value || '').toLowerCase();
  const location = document.getElementById('location-filter')?.value || 'All';
  return getAllComplaints().filter(c => {
    const mSearch   = c.id.toLowerCase().includes(search) || c.title.toLowerCase().includes(search);
    const mLocation = location === 'All' || c.location.startsWith(location);
    return mSearch && mLocation;
  });
}

function renderGrid() {
  const filtered = getFiltered();
  const grid = document.getElementById('complaints-grid');
  if (!grid) return;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      <h3>No Complaints Found</h3><p>No complaints match your current filters.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <div class="complaint-grid-card" onclick="openModal('${c.id}')">
      <div class="complaint-grid-img-wrap">
        <img src="${c.imageUrl}" alt="${c.title}" class="complaint-grid-img"
          onerror="this.src='https://placehold.co/400x180/e5e7eb/6b7280?text=Image'">
        <div class="urgency-badge ${urgencyClass(c.urgency)}">${c.urgency} Priority</div>
        ${c.accepted ? '<div style="position:absolute;bottom:8px;left:8px;background:#16A34A;color:#fff;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:999px;">✓ Accepted</div>' : ''}
      </div>
      <div class="complaint-grid-body">
        <div class="complaint-grid-id-row">
          <span class="complaint-grid-id">${c.id}</span>
          <span class="badge badge-yellow">${c.issueType}</span>
        </div>
        <h3 class="complaint-grid-title">${c.title}</h3>
        <p class="complaint-grid-desc">${c.description}</p>
        <div class="complaint-grid-meta">
          <div class="complaint-grid-meta-row">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${c.location}
          </div>
          <div class="complaint-grid-meta-row">
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Deadline: ${c.deadline}
          </div>
        </div>
        <button class="btn btn-accent btn-full" onclick="event.stopPropagation();openModal('${c.id}')">
          View Details
        </button>
      </div>
    </div>
  `).join('');

  // Auto-open if navigated here with ?open=ID
  const openId = getParam('open');
  if (openId) {
    openModal(openId);
    // Clean URL without reload
    history.replaceState(null, '', 'available-complaints.html');
  }
}

function openModal(id) {
  const list = getAllComplaints();
  selectedComplaint = list.find(c => c.id === id);
  if (!selectedComplaint) return;
  const c = selectedComplaint;

  document.getElementById('modal-urgency').className = `badge urgency-badge ${urgencyClass(c.urgency)}`;
  document.getElementById('modal-urgency').textContent = `${c.urgency} Priority`;
  document.getElementById('modal-img').src = c.imageUrl;
  document.getElementById('modal-img').onerror = () => { document.getElementById('modal-img').src = 'https://placehold.co/400x260/e5e7eb/6b7280?text=Image'; };
  document.getElementById('modal-id').textContent = c.id;
  document.getElementById('modal-issue-type').textContent = c.issueType;
  document.getElementById('modal-title').textContent = c.title;
  document.getElementById('modal-desc').textContent = c.description;
  document.getElementById('modal-location').textContent = c.location;
  document.getElementById('modal-deadline').textContent = c.deadline;

  if (c.accepted) {
    document.getElementById('modal-actions').innerHTML = `
      <div class="modal-accepted">
        <p class="main">✓ Added to Your Assigned Tasks</p>
        <p class="sub">You can view this in <a href="assigned-tasks.html" style="color:#42a443;font-weight:700;">Assigned Tasks</a></p>
      </div>`;
  } else {
    document.getElementById('modal-actions').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:12px;">
        <button class="btn btn-accent btn-full" id="modal-accept-btn">Accept Complaint</button>
        <button class="btn btn-red btn-full" id="modal-reject-btn">Reject Complaint</button>
      </div>`;
    document.getElementById('modal-accept-btn').addEventListener('click', () => handleAccept(c.id));
    document.getElementById('modal-reject-btn').addEventListener('click', () => handleReject(c.id));
  }

  document.getElementById('complaint-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('complaint-modal').classList.remove('open');
  selectedComplaint = null;
}

function handleAccept(id) {
  acceptComplaint(id); // persists to localStorage + adds to tasks + adds notification
  document.getElementById('modal-actions').innerHTML = `
    <div class="modal-accepted">
      <p class="main">✓ Added to Your Assigned Tasks</p>
      <p class="sub">You can view this in <a href="assigned-tasks.html" style="color:#42a443;font-weight:700;">Assigned Tasks</a></p>
    </div>`;
  renderGrid();
}

function handleReject(id) {
  rejectComplaint(id);
  closeModal();
  renderGrid();
}

function buildPage() {
  initShell('complaints');
  const content = document.getElementById('page-content');
  content.innerHTML = `
    <div class="page-header">
      <h1>Available Complaints</h1>
      <p>View complaints related to your service category and choose to accept or reject them.</p>
    </div>

    <div class="filters-bar">
      <div class="filters-grid">
        <div class="filter-field">
          <svg class="filter-field-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" class="filter-input" placeholder="Search by Complaint ID or title">
        </div>
        <div class="filter-field">
          <svg class="filter-field-icon" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <select class="filter-select" id="service-filter">
            <option value="Plumbing">Plumbing</option>
            <option value="Electrical">Electrical</option>
            <option value="Carpentry">Carpentry</option>
            <option value="HVAC">HVAC</option>
          </select>
        </div>
        <div class="filter-field">
          <svg class="filter-field-icon" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <select class="filter-select" id="location-filter">
            <option value="All">All Locations</option>
            <option value="Building A">Building A</option>
            <option value="Building B">Building B</option>
            <option value="Building C">Building C</option>
            <option value="Building D">Building D</option>
          </select>
        </div>
        <div class="filter-field">
          <svg class="filter-field-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <select class="filter-select" id="deadline-filter">
            <option value="All">All Deadlines</option>
            <option value="Today">Due Today</option>
            <option value="Week">This Week</option>
            <option value="Month">This Month</option>
          </select>
        </div>
      </div>
    </div>

    <div class="complaints-grid" id="complaints-grid"></div>

    <div class="pagination">
      <button>Previous</button>
      <button class="active">1</button>
      <button>2</button>
      <button>3</button>
      <button>Next</button>
    </div>

    <!-- Modal -->
    <div class="modal-backdrop" id="complaint-modal" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-header-left">
            <h2>Complaint Details</h2>
            <span id="modal-urgency" class="badge urgency-high"></span>
          </div>
          <button class="modal-close" onclick="closeModal()">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="modal-grid">
            <div>
              <img id="modal-img" src="" alt="" class="modal-img" style="margin-bottom:16px;">
              <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
                <span id="modal-id" style="font-size:1.1rem;font-weight:600;"></span>
                <span id="modal-issue-type" class="badge badge-yellow"></span>
              </div>
              <h3 id="modal-title" style="font-size:1.1rem;"></h3>
            </div>
            <div>
              <div class="detail-section">
                <p class="detail-label"><span class="detail-label-bar"></span>Description</p>
                <p id="modal-desc" style="font-size:0.95rem;color:var(--muted-foreground);line-height:1.6;"></p>
              </div>
              <div class="detail-section">
                <p class="detail-label"><span class="detail-label-bar"></span>Location</p>
                <div class="detail-box green">
                  <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  <span id="modal-location"></span>
                </div>
              </div>
              <div class="detail-section">
                <p class="detail-label"><span class="detail-label-bar"></span>Deadline</p>
                <div class="detail-box red">
                  <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <span id="modal-deadline"></span>
                </div>
              </div>
              <div class="modal-action-area" id="modal-actions"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('search-input').addEventListener('input', renderGrid);
  document.getElementById('location-filter').addEventListener('change', renderGrid);
  renderGrid();
}

document.addEventListener('DOMContentLoaded', buildPage);
</script>
</body>
</html>
