<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Estimate — PropSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<script src="js/taskData.js"></script>
<script>
function showToast(msg, color) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${color||'#42a443'};color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:9999;`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

function buildPage() {
  initShell('tasks');
  const taskId = getParam('task');
  const content = document.getElementById('page-content');
  const task = taskId ? getTask(taskId) : null;

  if (!task) {
    content.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h3>Task Not Found</h3><p>The task you're looking for doesn't exist.</p>
        <div style="margin-top:20px;"><button class="btn btn-dark" onclick="location.href='assigned-tasks.html'">Back to Assigned Tasks</button></div>
      </div>`;
    return;
  }

  // Already submitted — show read-only view
  if (task.estimateSubmitted && task.estimate) {
    content.innerHTML = `
      <div style="max-width:800px;margin-inline:auto;">
        <button class="back-btn" onclick="location.href='task-details.html?task=${task.id}'">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Task Details
        </button>
        <div class="page-header">
          <h1>Estimate Already Submitted</h1>
          <p>A service estimate has already been submitted for this task.</p>
        </div>
        <div class="card">
          <div class="colored-card-header green"><h2>Submitted Estimate</h2></div>
          <div class="card-body">
            <div class="alert-box green" style="margin-bottom:24px;">
              <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              <p style="font-size:0.9rem;font-weight:600;">Estimate submitted. Awaiting manager approval.</p>
            </div>
            <div class="info-grid-2" style="margin-bottom:20px;">
              <div><label style="display:block;font-size:0.82rem;font-weight:700;color:#374151;margin-bottom:6px;">Cost</label>
                <p style="font-size:1.6rem;font-weight:700;color:#16A34A;">${task.estimate.cost}</p></div>
              <div><label style="display:block;font-size:0.82rem;font-weight:700;color:#374151;margin-bottom:6px;">Completion Time</label>
                <p style="font-size:1.2rem;font-weight:600;">${task.estimate.completionTime}</p></div>
            </div>
            <div style="margin-bottom:20px;">
              <label style="display:block;font-size:0.82rem;font-weight:700;color:#374151;margin-bottom:6px;">Description of Work</label>
              <p style="font-size:0.9rem;color:var(--muted-foreground);line-height:1.6;">${task.estimate.workDescription}</p>
            </div>
            <div class="file-row">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              <span>${task.estimate.uploadedFile}</span>
            </div>
            <div style="margin-top:24px;">
              <button class="btn btn-ghost btn-full" onclick="location.href='task-details.html?task=${task.id}'">View Full Task Details</button>
            </div>
          </div>
        </div>
      </div>`;
    return;
  }

  const priorityColor = { High:'#DC2626', Medium:'#F59E0B', Low:'#10B981' }[task.priority] || '#6B7280';

  content.innerHTML = `
    <div style="max-width:800px;margin-inline:auto;">
      <button class="back-btn" onclick="location.href='task-details.html?task=${task.id}'">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Task Details
      </button>

      <div class="page-header">
        <h1>Submit Estimate</h1>
        <p>Provide a detailed estimate for the assigned maintenance task.</p>
      </div>

      <div class="card mb-6">
        <div class="card-body">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
            <h2 style="font-size:1.1rem;">Task Information</h2>
            <span class="badge badge-yellow">${task.id}</span>
          </div>
          <div class="info-grid-2" style="margin-bottom:0;">
            <div><span style="font-size:0.85rem;color:var(--muted-foreground);">Issue Type:</span> <span style="font-weight:600;margin-left:6px;">${task.issueType}</span></div>
            <div><span style="font-size:0.85rem;color:var(--muted-foreground);">Priority:</span> <span style="font-weight:600;color:${priorityColor};margin-left:6px;">${task.priority}</span></div>
            <div><span style="font-size:0.85rem;color:var(--muted-foreground);">Location:</span> <span style="font-weight:600;margin-left:6px;">${task.location}</span></div>
            <div><span style="font-size:0.85rem;color:var(--muted-foreground);">Deadline:</span> <span style="font-weight:600;margin-left:6px;">${task.deadline}</span></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="colored-card-header green"><h2>Estimate Details</h2></div>
        <div class="card-body">
          <div class="form-field">
            <label class="form-label">
              <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              Estimated Cost *
            </label>
            <input type="text" id="cost-input" class="form-input" placeholder="e.g., $450.00">
            <p id="cost-err" style="color:#DC2626;font-size:0.8rem;margin-top:4px;display:none;">Please enter an estimated cost.</p>
          </div>
          <div class="form-field">
            <label class="form-label">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Estimated Completion Time *
            </label>
            <input type="text" id="time-input" class="form-input" placeholder="e.g., 4 hours">
            <p id="time-err" style="color:#DC2626;font-size:0.8rem;margin-top:4px;display:none;">Please enter estimated completion time.</p>
          </div>
          <div class="form-field">
            <label class="form-label">Description of Work *</label>
            <textarea id="desc-input" class="form-textarea" rows="6"
              placeholder="Provide a detailed description of the work to be performed..."></textarea>
            <p id="desc-err" style="color:#DC2626;font-size:0.8rem;margin-top:4px;display:none;">Please provide a description of work.</p>
          </div>
          <div class="form-field">
            <label class="form-label">Upload Estimate Document (Optional)</label>
            <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-upload').click()">
              <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
              <input type="file" id="file-upload" style="display:none;" accept=".pdf,.doc,.docx,.xlsx,.xls">
              <div id="upload-label-text" class="upload-zone-label">Click to upload or drag and drop</div>
              <p class="upload-zone-sub">PDF, Word, or Excel (max 10MB)</p>
            </div>
          </div>
          <div class="form-btn-row">
            <button class="btn btn-accent" id="submit-btn">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Submit Estimate
            </button>
            <button class="btn btn-gray" onclick="location.href='task-details.html?task=${task.id}'">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('file-upload').addEventListener('change', function() {
    document.getElementById('upload-label-text').textContent =
      this.files[0] ? this.files[0].name : 'Click to upload or drag and drop';
  });

  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='#42a443'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor=''; });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.style.borderColor='';
    if (e.dataTransfer.files[0])
      document.getElementById('upload-label-text').textContent = e.dataTransfer.files[0].name;
  });

  document.getElementById('submit-btn').addEventListener('click', () => {
    const cost = document.getElementById('cost-input').value.trim();
    const time = document.getElementById('time-input').value.trim();
    const desc = document.getElementById('desc-input').value.trim();
    const file = document.getElementById('file-upload');
    document.getElementById('cost-err').style.display = cost ? 'none' : 'block';
    document.getElementById('time-err').style.display = time ? 'none' : 'block';
    document.getElementById('desc-err').style.display = desc ? 'none' : 'block';
    if (!cost || !time || !desc) return;

    submitEstimate(taskId, {
      cost, completionTime: time, workDescription: desc,
      uploadedFile: file.files[0] ? file.files[0].name : 'No file uploaded'
    });

    showToast('Estimate submitted successfully!');
    setTimeout(() => location.href = 'task-details.html?task=' + taskId, 1200);
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#42a443;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:9999;';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

document.addEventListener('DOMContentLoaded', buildPage);
</script>
</body>
</html>
