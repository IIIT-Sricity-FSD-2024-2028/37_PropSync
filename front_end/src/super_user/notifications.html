<!-- pages/notifications.html -->
<div id="page-notifications" class="page">
  <div style="max-width:1024px;margin:0 auto;">

    <!-- Header card -->
    <div class="notif-page-header">
      <div class="notif-page-header-top">
        <div>
          <h1>Notifications</h1>
          <p>View alerts and updates related to system activities and user management.</p>
        </div>
        <span class="unread-pill hidden" id="notif-unread-pill">0 Unread</span>
      </div>

      <div class="notif-filter-row">
        <div class="relative">
          <button class="notif-filter-btn" id="notif-filter-btn">
            <div style="display:flex;align-items:center;gap:8px;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
              </svg>
              <span id="notif-filter-label">All Notifications</span>
            </div>
            <svg class="chevron-icon" id="notif-filter-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
            </svg>
          </button>
          <div class="notif-filter-dropdown" id="notif-filter-menu">
            <button data-filter="all" class="active">All Notifications</button>
            <button data-filter="unread">Unread Only</button>
            <button data-filter="read">Read Only</button>
          </div>
        </div>

        <div class="notif-actions">
          <button class="btn btn-green" id="mark-all-read-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" style="width:16px;height:16px;stroke:#fff;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
            </svg>
            Mark All Read
          </button>
          <button class="btn btn-outline" id="clear-all-notif-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" style="width:16px;height:16px;stroke:#374151;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
            </svg>
            Clear All
          </button>
        </div>
      </div>
    </div>

    <!-- Notifications list -->
    <div id="notifications-list"></div>
  </div>
</div>
